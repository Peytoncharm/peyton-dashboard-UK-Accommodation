<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0d12">
<title>Peyton & Charmed Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{background:#0b0d12;color:#e6e8ef;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100%;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#98a0b8;font-size:14px;gap:12px}
#loading .sp{width:28px;height:28px;border:3px solid #232839;border-top-color:#2dd4a0;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes flowAnim{to{stroke-dashoffset:-16}}
@keyframes pulseGlow{0%,100%{opacity:1}50%{opacity:.35}}
.flow-active{animation:flowAnim 1s linear infinite}
.flow-wait{animation:pulseGlow 1.5s ease-in-out infinite}
#err-box{display:none;padding:40px 20px;text-align:center;color:#f06060;font-size:13px}
</style>
</head>
<body>
<div id="loading"><div class="sp"></div><div>Loading Dashboard...</div></div>
<div id="err-box"><div style="font-size:24px;margin-bottom:12px">⚠️</div><div style="font-weight:700">โหลดไม่สำเร็จ</div><div id="err-msg" style="color:#98a0b8;font-size:11px;margin-top:6px"></div></div>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script>window.addEventListener("error",function(e){document.getElementById("loading").style.display="none";document.getElementById("err-box").style.display="block";document.getElementById("err-msg").textContent=e.message||"Unknown error"});</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const G="#2dd4a0",A="#f5b731",R="#f06060",B="#5b9cf5",CY="#30d5e8",OR="#f5993b",PK="#e86fa0";
const S1="#13161f",S2="#1a1e2a",S3="#232839",B1="#2a3050",T1="#e6e8ef",T2="#98a0b8",T3="#5f6680";
const sc=function(s){return s==="ok"||s==="live"?G:s==="wip"?A:s==="error"||s==="fail"?R:T3};
const Empty=function(p){return <div style={{textAlign:"center",padding:30,color:T3,fontSize:12}}>{p.msg||"ยังไม่มีข้อมูล"}</div>};
const Spin=function(){return <div style={{textAlign:"center",padding:30,color:T3,fontSize:12}}>⏳ กำลังโหลด...</div>};
const Bar=function(p){return <div style={{width:"100%",height:4,background:S3,borderRadius:2,overflow:"hidden"}}><div style={{width:Math.min(p.v||0,100)+"%",height:"100%",borderRadius:2,background:p.c||G}}/></div>};

function App() {
  const [tab, setTab] = useState("cust");
  const [d, setD] = useState({health:null,cust:null,err:null,perf:null,tasks:null,agents:null,map:null,ok:false,ts:null,loading:true});

  useEffect(function(){
    var b="https://peyton-charmed-bot.onrender.com";
    try{var s=localStorage.getItem("pc_api");if(s)b=s}catch(x){}
    function df(){
      Promise.all([
        fetch(b+"/api/dashboard/health",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/customers",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/errors",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/performance",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/tasks",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/agents",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/comms_map",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
      ]).then(function(r){
        setD({health:r[0],cust:r[1],err:r[2],perf:r[3],tasks:r[4],agents:r[5],map:r[6],ok:!!(r[0]),ts:new Date().toLocaleTimeString("th-TH"),loading:false});
      });
    }
    df();var iv=setInterval(df,30000);return function(){clearInterval(iv)};
  },[]);

  var agents = (d.agents && d.agents.agents) || [];
  var summary = (d.agents && d.agents.summary) || {};
  var customers = (d.cust && d.cust.customers) || [];
  var stateGroups = (d.cust && d.cust.state_groups) || {};
  var errors = (d.err && d.err.errors) || [];
  var tasks = (d.tasks && d.tasks.tasks) || [];
  var perfAgents = (d.perf && d.perf.agents) || [];
  var dailyTrend = (d.perf && d.perf.daily_trend) || [];
  var mapNodes = (d.map && d.map.nodes) || [];
  var mapEdges = (d.map && d.map.edges) || [];

  return (
    <div style={{background:"#0b0d12",color:T1,fontFamily:"system-ui,sans-serif",fontSize:13,minHeight:"100vh"}}>

      {/* Header */}
      <div style={{padding:"12px 16px 8px",borderBottom:"1px solid "+B1,background:"linear-gradient(180deg,#101320,#0b0d12)"}}>
        <div style={{fontSize:15,fontWeight:700}}>🏠 Peyton & Charmed <span style={{fontSize:8,background:G,color:"#000",padding:"1px 7px",borderRadius:7,marginLeft:4}}>DASHBOARD</span></div>
        <div style={{fontSize:9,color:T3}}>ข้อมูล real-time จาก API — auto-refresh ทุก 30 วินาที</div>
      </div>

      {/* Connection Bar */}
      <div style={{padding:"5px 16px",fontSize:10,display:"flex",alignItems:"center",gap:6,borderBottom:"1px solid "+B1,background:d.ok?G+"10":d.loading?A+"10":R+"10",color:d.ok?G:d.loading?A:R}}>
        <span style={{width:7,height:7,borderRadius:"50%",background:d.ok?G:d.loading?A:R,display:"inline-block"}}/>
        {d.ok?"📡 เชื่อมต่อ API สำเร็จ | อัพเดท: "+(d.ts||"—"):d.loading?"กำลังเชื่อมต่อ API...":"❌ เชื่อมต่อ API ไม่ได้"}
      </div>

      {/* Nav */}
      <div style={{display:"flex",gap:1,padding:"0 16px",borderBottom:"1px solid "+B1,background:S1,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {[["cust","👥 Customers"],["agents","🤖 Agents"],["tasks","📋 Tasks"],["perf","📈 Performance"],["map","🗺️ Comm Map"],["health","💚 Health"],["sett","⚙️ Settings"]].map(function(x){
          return <button key={x[0]} onClick={function(){setTab(x[0])}} style={{padding:"7px 10px",fontSize:10,fontWeight:500,cursor:"pointer",border:"none",background:"none",borderBottom:"2px solid "+(tab===x[0]?G:"transparent"),color:tab===x[0]?G:T3,fontFamily:"inherit",whiteSpace:"nowrap"}}>{x[1]}</button>
        })}
      </div>

      <div style={{padding:"12px 16px 40px"}}>

        {/* ═══ CUSTOMERS — REAL DATA ═══ */}
        {tab==="cust" && <div>
          {d.loading && <Spin/>}
          {!d.loading && customers.length===0 && <Empty msg="ยังไม่มีลูกค้าใน Redis — จะแสดงเมื่อมีลูกค้าเข้ามาทาง LINE"/>}
          {customers.length>0 && <div>
            <div style={{fontSize:11,fontWeight:600,color:CY,marginBottom:6}}>📡 ลูกค้าจริงจาก Redis — {d.cust.total} คน</div>
            {Object.keys(stateGroups).length>0 && <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:8}}>
              {Object.entries(stateGroups).sort(function(a,b){return b[1]-a[1]}).map(function(e){
                return <span key={e[0]} style={{background:S1,border:"1px solid "+B1,borderRadius:5,padding:"3px 7px",fontSize:9}}><b style={{color:CY}}>{e[0]}</b> <span style={{color:T2}}>{e[1]}</span></span>
              })}
            </div>}
            {customers.map(function(c,i){
              return <div key={i} style={{background:S1,border:"1px solid "+B1,borderRadius:6,padding:"8px 10px",marginBottom:3,fontSize:10,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontFamily:"monospace",color:T3,minWidth:80}}>{(c.user_id||"").substring(0,12)}</span>
                <span style={{fontWeight:600,color:CY,minWidth:130}}>{c.state||"UNKNOWN"}</span>
                <span style={{color:T2,flex:1}}>{c.agent||"—"}</span>
                <span style={{fontSize:8,color:T3}}>{c.updated||""}</span>
              </div>
            })}
          </div>}
        </div>}

        {/* ═══ AGENTS — REAL DATA ═══ */}
        {tab==="agents" && <div>
          {d.loading && <Spin/>}
          {!d.loading && agents.length===0 && <Empty msg="ไม่สามารถโหลด agent data ได้"/>}
          {agents.length>0 && <div>
            <div style={{fontSize:11,fontWeight:600,color:CY,marginBottom:6}}>📡 Agent Registry — {summary.total||agents.length} agents ({summary.live||0} live, {summary.wip||0} wip, {summary.plan||0} plan)</div>
            {agents.filter(function(a){return a.error_count_24h>0}).length>0 && <div style={{marginBottom:8}}>
              {agents.filter(function(a){return a.error_count_24h>0}).map(function(a){
                return <span key={a.id} style={{display:"inline-block",background:R+"10",border:"1px solid "+R+"30",borderRadius:5,padding:"2px 7px",fontSize:9,color:R,marginRight:4,marginBottom:3}}>⚠️ {a.name}: {a.error_count_24h} errors</span>
              })}
            </div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:5}}>
              {agents.map(function(a){
                var m=a.metrics||{};
                var calls=m.total_calls||0;
                var rate=m.success_rate||0;
                var ms=m.avg_ms||0;
                return <div key={a.id} style={{background:S1,border:"1px solid "+B1,borderRadius:8,padding:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                    <span style={{fontSize:14}}>{a.icon||"🤖"}</span>
                    <span style={{fontWeight:600,color:CY,fontSize:11}}>{a.name}</span>
                    <span style={{fontSize:7,fontWeight:700,padding:"1px 5px",borderRadius:5,color:sc(a.status),background:sc(a.status)+"15"}}>{(a.status||"?").toUpperCase()}</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3,marginBottom:4}}>
                    <div style={{background:S2,borderRadius:4,padding:"3px 4px",textAlign:"center"}}>
                      <div style={{fontSize:11,fontWeight:700,fontFamily:"monospace",color:calls>0?G:T3}}>{calls}</div>
                      <div style={{fontSize:6,color:T3}}>CALLS</div>
                    </div>
                    <div style={{background:S2,borderRadius:4,padding:"3px 4px",textAlign:"center"}}>
                      <div style={{fontSize:11,fontWeight:700,fontFamily:"monospace",color:rate>=90?G:rate>=70?A:rate>0?R:T3}}>{rate>0?rate+"%":"—"}</div>
                      <div style={{fontSize:6,color:T3}}>RATE</div>
                    </div>
                    <div style={{background:S2,borderRadius:4,padding:"3px 4px",textAlign:"center"}}>
                      <div style={{fontSize:11,fontWeight:700,fontFamily:"monospace",color:B}}>{ms>1000?(ms/1000).toFixed(1)+"s":ms>0?ms+"ms":"—"}</div>
                      <div style={{fontSize:6,color:T3}}>TIME</div>
                    </div>
                  </div>
                  <div style={{fontSize:7,color:T3,display:"flex",justifyContent:"space-between"}}><span>Auto%</span><span style={{fontFamily:"monospace",color:a.auto>=80?G:a.auto>0?A:T3}}>{a.auto}%</span></div>
                  <Bar v={a.auto} c={a.auto>=80?G:A}/>
                  {a.error_count_24h>0&&<div style={{fontSize:8,color:R,marginTop:3}}>⚠️ {a.error_count_24h} errors 24h</div>}
                </div>
              })}
            </div>
          </div>}
        </div>}

        {/* ═══ TASKS + ERRORS — REAL DATA ═══ */}
        {tab==="tasks" && <div>
          {d.loading && <Spin/>}
          {!d.loading && errors.length===0 && tasks.length===0 && <Empty msg="ยังไม่มี tasks/errors วันนี้ — จะแสดงเมื่อ agent ทำงาน"/>}
          {errors.length>0 && <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:600,color:R,marginBottom:4}}>🔴 Errors จริงจาก Audit Agent ({errors.length})</div>
            {errors.slice(0,15).map(function(e,i){
              return <div key={i} style={{background:S1,border:"1px solid "+R+"30",borderRadius:6,padding:"6px 10px",marginBottom:3,fontSize:10}}>
                <b style={{color:R}}>{e.agent||"?"}</b> <span style={{color:T2}}>{e.message||e.error||JSON.stringify(e).substring(0,100)}</span>
              </div>
            })}
          </div>}
          {tasks.length>0 && <div>
            <div style={{fontSize:11,fontWeight:600,color:G,marginBottom:4}}>📋 Tasks วันนี้ ({tasks.length})</div>
            {tasks.slice(0,20).map(function(t,i){
              return <div key={i} style={{background:S1,border:"1px solid "+B1,borderRadius:6,padding:"6px 10px",marginBottom:3,display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",fontSize:10}}>
                <span style={{fontFamily:"monospace",color:T3,minWidth:45}}>{t.time_str||"—"}</span>
                <span style={{fontWeight:600,color:CY,minWidth:80}}>{t.agent||"?"}</span>
                <span style={{color:T2,flex:1}}>{t.action||""}</span>
                <span style={{fontSize:7,fontWeight:700,padding:"1px 5px",borderRadius:5,color:sc(t.status),background:sc(t.status)+"12"}}>{t.status||"?"}</span>
              </div>
            })}
          </div>}
        </div>}

        {/* ═══ PERFORMANCE — REAL DATA ═══ */}
        {tab==="perf" && <div>
          {d.loading && <Spin/>}
          {!d.loading && perfAgents.length===0 && <Empty msg="ยังไม่มี performance data — เพิ่ม track_agent_call() ใน agent แต่ละตัว"/>}
          {perfAgents.length>0 && <div>
            <div style={{fontSize:11,fontWeight:600,color:CY,marginBottom:8}}>📡 Performance จริงจาก Redis</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:5,marginBottom:14}}>
              {[
                [perfAgents.reduce(function(s,a){return s+(a.total_calls||0)},0),"Total Calls",B],
                [perfAgents.filter(function(a){return a.total_calls>0}).length+"/"+perfAgents.length,"Active Agents",G],
                [perfAgents.reduce(function(s,a){return s+(a.fail||0)},0),"Total Fails",R],
              ].map(function(x,i){
                return <div key={i} style={{background:S1,border:"1px solid "+B1,borderRadius:8,padding:"8px 10px"}}>
                  <div style={{fontSize:16,fontWeight:700,fontFamily:"monospace",color:x[2]}}>{x[0]}</div>
                  <div style={{fontSize:7,color:T3,textTransform:"uppercase",marginTop:2}}>{x[1]}</div>
                </div>
              })}
            </div>
            {dailyTrend.length>0 && dailyTrend.some(function(d){return d.calls>0}) && <div>
              <div style={{fontSize:11,fontWeight:600,margin:"8px 0 6px"}}>📈 Trend 7 วัน</div>
              <div style={{background:S1,border:"1px solid "+B1,borderRadius:8,padding:14,marginBottom:14}}>
                <div style={{display:"flex",alignItems:"flex-end",gap:5,height:90}}>
                  {dailyTrend.map(function(dd,i){
                    var mx=Math.max.apply(null,dailyTrend.map(function(x){return x.calls||1}));
                    var h=Math.max((dd.calls||0)/mx*100,4);
                    return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <div style={{fontSize:8,fontFamily:"monospace",color:T2}}>{dd.calls||0}</div>
                      <div style={{width:"100%",height:h+"%",background:G,borderRadius:"3px 3px 0 0"}}/>
                      <div style={{fontSize:7,color:T3}}>{(dd.date||"").slice(5)}</div>
                    </div>
                  })}
                </div>
              </div>
            </div>}
            <div style={{fontSize:11,fontWeight:600,margin:"8px 0 6px"}}>🏆 Agent Ranking (by calls)</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                <thead><tr>{["Agent","Status","Calls","Success","Fail","Rate","Avg Time"].map(function(h){
                  return <th key={h} style={{textAlign:"left",fontSize:7,fontWeight:600,color:T3,padding:"5px 6px",borderBottom:"1px solid "+B1,whiteSpace:"nowrap"}}>{h}</th>
                })}</tr></thead>
                <tbody>
                  {perfAgents.sort(function(a,b){return (b.total_calls||0)-(a.total_calls||0)}).map(function(a){
                    return <tr key={a.id} style={{borderBottom:"1px solid "+B1}}>
                      <td style={{padding:"5px 6px",fontWeight:600,whiteSpace:"nowrap"}}>{a.icon} {a.name}</td>
                      <td><span style={{fontSize:7,fontWeight:700,padding:"1px 4px",borderRadius:4,color:sc(a.status),background:sc(a.status)+"15"}}>{(a.status||"?").toUpperCase()}</span></td>
                      <td style={{fontFamily:"monospace"}}>{a.total_calls||0}</td>
                      <td style={{fontFamily:"monospace",color:G}}>{a.success||0}</td>
                      <td style={{fontFamily:"monospace",color:(a.fail||0)>0?R:T3}}>{a.fail||0}</td>
                      <td style={{fontFamily:"monospace",color:(a.success_rate||0)>=90?G:(a.success_rate||0)>0?A:T3}}>{(a.success_rate||0)>0?a.success_rate+"%":"—"}</td>
                      <td style={{fontFamily:"monospace",fontSize:9}}>{(a.avg_ms||0)>1000?((a.avg_ms||0)/1000).toFixed(1)+"s":(a.avg_ms||0)>0?a.avg_ms+"ms":"—"}</td>
                    </tr>
                  })}
                </tbody>
              </table>
            </div>
          </div>}
        </div>}

        {/* ═══ COMM MAP — REAL TOPOLOGY ═══ */}
        {tab==="map" && <div>
          {d.loading && <Spin/>}
          {!d.loading && mapNodes.length===0 && <Empty msg="ไม่สามารถโหลด topology ได้"/>}
          {mapNodes.length>0 && <div>
            <div style={{fontSize:11,fontWeight:600,color:CY,marginBottom:6}}>📡 Agent Topology จริง — {mapNodes.length} nodes, {mapEdges.length} connections</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8,fontSize:9,color:T2}}>
              <span><span style={{color:G}}>●</span> Live ({mapNodes.filter(function(n){return n.status==="live"}).length})</span>
              <span><span style={{color:A}}>●</span> WIP ({mapNodes.filter(function(n){return n.status==="wip"}).length})</span>
              <span><span style={{color:T3}}>●</span> Plan ({mapNodes.filter(function(n){return n.status==="plan"}).length})</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:4}}>
              {mapNodes.map(function(n){
                var c=sc(n.status);
                return <div key={n.id} style={{background:S1,border:"1px solid "+c+"30",borderRadius:6,padding:"6px 8px",fontSize:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <span style={{fontSize:13}}>{n.icon||"🤖"}</span>
                    <span style={{fontWeight:600,color:c}}>{n.name}</span>
                  </div>
                  <div style={{fontSize:7,color:T3,marginTop:2}}>Tab {n.tab} • Auto {n.auto}%</div>
                </div>
              })}
            </div>
          </div>}
        </div>}

        {/* ═══ HEALTH — REAL DATA ═══ */}
        {tab==="health" && <div>
          {d.loading && <Spin/>}
          {!d.loading && !d.health && <Empty msg="ไม่สามารถเชื่อมต่อ API ได้ — ตรวจสอบ Settings"/>}
          {d.health && <div>
            <div style={{fontSize:13,fontWeight:600,margin:"4px 0 8px"}}>{d.health.overall==="healthy"?"✅":"⚠️"} ระบบ: <span style={{color:d.health.overall==="healthy"?G:A}}>{d.health.overall}</span></div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:5}}>
              {Object.entries(d.health.checks||{}).map(function(e){
                var k=e[0],v=e[1],dc=v.status==="ok"?G:R;
                return <div key={k} style={{background:S1,border:"1px solid "+B1,borderRadius:8,padding:10}}>
                  <div style={{fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:5}}><span style={{width:7,height:7,borderRadius:"50%",background:dc,display:"inline-block"}}/>{k.toUpperCase()}</div>
                  <div style={{fontSize:10,color:T2,marginTop:3}}>{v.status==="ok"?"ทำงานปกติ":(v.msg||v.status)}</div>
                  {v.pending!==undefined&&<div style={{fontSize:9,color:A,marginTop:2}}>รอ: {v.pending}</div>}
                </div>
              })}
            </div>
            <div style={{fontSize:8,color:T3,marginTop:10}}>อัพเดท: {d.health.timestamp||"—"}</div>
          </div>}
        </div>}

        {/* ═══ SETTINGS ═══ */}
        {tab==="sett" && <div style={{maxWidth:480}}>
          <div style={{fontSize:13,fontWeight:600,margin:"4px 0 8px"}}>⚙️ ตั้งค่า</div>
          <div style={{fontSize:10,color:T2,marginBottom:3}}>API Base URL</div>
          <input id="apiUrl" defaultValue="https://peyton-charmed-bot.onrender.com" style={{background:S2,border:"1px solid "+B1,color:T1,padding:"7px 10px",borderRadius:6,width:"100%",fontSize:11,fontFamily:"monospace",marginBottom:8}}/>
          <button onClick={function(){var u=document.getElementById("apiUrl").value;try{localStorage.setItem("pc_api",u)}catch(x){};alert("บันทึกแล้ว — reload เพื่อเชื่อมใหม่")}} style={{background:G,color:"#000",border:"none",padding:"7px 16px",borderRadius:6,fontWeight:600,fontSize:11,cursor:"pointer"}}>💾 บันทึก</button>
          <div style={{marginTop:14,fontSize:10,color:T3,lineHeight:1.8}}>
            สถานะ: {d.ok?"✅ เชื่อมต่อแล้ว":"⏳ รอเชื่อมต่อ"}<br/>
            อัพเดท: {d.ts||"—"}<br/>
            Agents: {summary.total||0} total ({summary.live||0} live)<br/>
            Customers: {(d.cust&&d.cust.total)||0}<br/>
            Errors 24h: {errors.length}
          </div>
        </div>}

      </div>
    </div>
  );
}

document.getElementById("loading").style.display="none";
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
