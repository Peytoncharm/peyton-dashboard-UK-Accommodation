<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0d12">
<title>Peyton & Charmed Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{background:#0b0d12;color:#e6e8ef;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100%;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#98a0b8;font-size:14px;gap:12px}
#loading .sp{width:28px;height:28px;border:3px solid #232839;border-top-color:#2dd4a0;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#err-box{display:none;padding:40px 20px;text-align:center;color:#f06060;font-size:13px}
</style>
</head>
<body>
<div id="loading"><div class="sp"></div><div>Loading Dashboard...</div></div>
<div id="err-box"><div style="font-size:24px;margin-bottom:12px">&#x26A0;&#xFE0F;</div><div style="font-weight:700">&#x0E42;&#x0E2B;&#x0E25;&#x0E14;&#x0E44;&#x0E21;&#x0E48;&#x0E2A;&#x0E33;&#x0E40;&#x0E23;&#x0E47;&#x0E08;</div><div id="err-msg" style="color:#98a0b8;font-size:11px;margin-top:6px"></div></div>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script>window.addEventListener("error",function(e){document.getElementById("loading").style.display="none";document.getElementById("err-box").style.display="block";document.getElementById("err-msg").textContent=e.message||"Unknown error"});</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;
const G="#2dd4a0",A="#f5b731",R="#f06060",B="#5b9cf5",CY="#30d5e8",OR="#f5993b",PK="#e86fa0";
const S1="#13161f",S2="#1a1e2a",S3="#232839",B1="#2a3050",T1="#e6e8ef",T2="#98a0b8",T3="#5f6680";
const sc=function(s){return s==="ok"||s==="live"?G:s==="wip"?A:s==="error"||s==="fail"?R:T3};
const Bar=function(p){return <div style={{width:"100%",height:4,background:S3,borderRadius:2,overflow:"hidden"}}><div style={{width:Math.min(p.v||0,100)+"%",height:"100%",borderRadius:2,background:p.c||G}}/></div>};

function Modal(p){
  return <div onClick={p.onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:100,display:"flex",justifyContent:"center",alignItems:"flex-start",paddingTop:32,overflowY:"auto"}}>
    <div onClick={function(e){e.stopPropagation()}} style={{background:"#0d0f16",border:"1px solid "+B1,borderRadius:12,width:"92%",maxWidth:660,maxHeight:"85vh",overflowY:"auto",padding:18}}>
      <div style={{textAlign:"right"}}><button onClick={p.onClose} style={{background:"none",border:"none",color:T3,fontSize:18,cursor:"pointer"}}>&#x2715;</button></div>
      {p.children}
    </div>
  </div>
}

function App() {
  var _s = useState; var _e = useEffect;
  var ts = _s("cust"), tab = ts[0], setTab = ts[1];
  var ss = _s(null), selC = ss[0], setSelC = ss[1];
  var sa = _s(null), selA = sa[0], setSelA = sa[1];
  var ds = _s({health:null,cust:null,err:null,perf:null,tasks:null,agents:null,map:null,ok:false,ts:null,loading:true});
  var d = ds[0], setD = ds[1];

  _e(function(){
    var b="https://peyton-charmed-bot.onrender.com";
    try{var sv=localStorage.getItem("pc_api");if(sv)b=sv}catch(x){}
    function df(){
      Promise.all([
        fetch(b+"/api/dashboard/health",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/customers",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/errors",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/performance",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/tasks",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/agents",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
        fetch(b+"/api/dashboard/comms_map",{mode:"cors"}).then(function(r){return r.json()}).catch(function(){return null}),
      ]).then(function(r){
        setD({health:r[0],cust:r[1],err:r[2],perf:r[3],tasks:r[4],agents:r[5],map:r[6],ok:!!(r[0]),ts:new Date().toLocaleTimeString("th-TH"),loading:false});
      });
    }
    df();var iv=setInterval(df,30000);return function(){clearInterval(iv)};
  },[]);

  var agents=(d.agents&&d.agents.agents)||[];
  var summary=(d.agents&&d.agents.summary)||{};
  var customers=(d.cust&&d.cust.customers)||[];
  var errors=(d.err&&d.err.errors)||[];
  var tasks=(d.tasks&&d.tasks.tasks)||[];
  var perfAgents=(d.perf&&d.perf.agents)||[];
  var mapNodes=(d.map&&d.map.nodes)||[];

  // Tab definitions — using actual emoji characters (not HTML entities) so JSX renders them correctly
  var TABS = [
    ["cust",    "👥 Customers"],
    ["agents",  "🤖 Agents"],
    ["tasks",   "📋 Tasks"],
    ["perf",    "📈 Performance"],
    ["map",     "🗺️ Comm Map"],
    ["health",  "🩺 Health"],
    ["sett",    "⚙️ Settings"],
  ];

  return <div style={{background:"#0b0d12",color:T1,fontFamily:"system-ui,sans-serif",fontSize:13,minHeight:"100vh"}}>

    {selA && <Modal onClose={function(){setSelA(null)}}>
      <div style={{fontSize:17,fontWeight:700,marginBottom:4}}>{selA.icon} {selA.name}</div>
      <div style={{fontSize:10,color:T2,marginBottom:10}}>{selA.desc} &#x2022; <span style={{color:sc(selA.status)}}>{(selA.status||"").toUpperCase()}</span></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4,marginBottom:12}}>
        {[[selA.auto+"%","Auto%",selA.auto>=80?G:A],[(selA.metrics||{}).total_calls||0,"Calls",B],[(selA.metrics||{}).success_rate||"\u2014","Rate",G],[selA.error_count_24h||0,"Err 24h",R]].map(function(x,i){
          return <div key={i} style={{background:S2,borderRadius:6,padding:8,textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:700,fontFamily:"monospace",color:x[2]}}>{x[0]}</div>
            <div style={{fontSize:7,color:T3}}>{x[1]}</div>
          </div>
        })}
      </div>
      <div style={{fontSize:11,fontWeight:600,color:PK,marginBottom:4}}>👥 Customers</div>
      {customers.filter(function(c){return c.agent===selA.name}).map(function(c,i){
        return <div key={i} onClick={function(){setSelA(null);setSelC(c)}} style={{background:S2,borderRadius:5,padding:"4px 8px",marginBottom:2,fontSize:10,cursor:"pointer"}}>
          <span style={{color:PK,fontWeight:600}}>{c.name||c.user_id}</span> <span style={{color:T3}}>&mdash; {c.state}</span>
        </div>
      })}
    </Modal>}

    {selC && <Modal onClose={function(){setSelC(null)}}>
      <div style={{fontSize:17,fontWeight:700,marginBottom:2}}>👤 {selC.name||selC.user_id}</div>
      <div style={{fontSize:10,color:T2,marginBottom:10}}>{selC.user_id} &#x2022; <span style={{fontWeight:600,color:CY}}>{selC.state}</span></div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
        {[selC.city,selC.budget,selC.move_in,selC.pkg].filter(Boolean).map(function(v,i){
          return <span key={i} style={{background:S2,borderRadius:5,padding:"3px 8px",fontSize:10,fontWeight:600}}>{v}</span>
        })}
      </div>
      {selC.agent && <div>
        <div style={{fontSize:11,fontWeight:600,marginBottom:4}}>🤖 Agent</div>
        {agents.filter(function(a){return a.name===selC.agent}).map(function(a){
          return <div key={a.id} onClick={function(){setSelC(null);setSelA(a)}} style={{background:S2,borderRadius:6,padding:8,cursor:"pointer"}}>
            <span style={{fontSize:14}}>{a.icon}</span> <span style={{color:CY,fontWeight:600}}>{a.name}</span>
          </div>
        })}
      </div>}
    </Modal>}

    {/* Header */}
    <div style={{padding:"12px 16px 8px",borderBottom:"1px solid "+B1,background:"linear-gradient(180deg,#101320,#0b0d12)"}}>
      <div style={{fontSize:15,fontWeight:700}}>🏠 Peyton & Charmed <span style={{fontSize:8,background:G,color:"#000",padding:"1px 7px",borderRadius:7,marginLeft:4}}>DASHBOARD</span></div>
      <div style={{fontSize:9,color:T3}}>Click <span style={{color:CY}}>Agent name</span> or <span style={{color:PK}}>Customer name</span> for details</div>
    </div>

    {/* Status bar */}
    <div style={{padding:"5px 16px",fontSize:10,display:"flex",alignItems:"center",gap:6,borderBottom:"1px solid "+B1,background:d.ok?G+"10":d.loading?A+"10":R+"10",color:d.ok?G:d.loading?A:R}}>
      <span style={{width:7,height:7,borderRadius:"50%",background:d.ok?G:d.loading?A:R,display:"inline-block"}}/>
      {d.ok?"📡 API Connected | Updated: "+(d.ts||"\u2014"):d.loading?"Connecting...":"❌ Connection failed"}
    </div>

    {/* Tabs */}
    <div style={{display:"flex",gap:1,padding:"0 16px",borderBottom:"1px solid "+B1,background:S1,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
      {TABS.map(function(x){
        return <button key={x[0]} onClick={function(){setTab(x[0])}} style={{padding:"7px 10px",fontSize:10,fontWeight:500,cursor:"pointer",border:"none",background:"none",borderBottom:"2px solid "+(tab===x[0]?G:"transparent"),color:tab===x[0]?G:T3,fontFamily:"inherit",whiteSpace:"nowrap"}}>{x[1]}</button>
      })}
    </div>

    <div style={{padding:"12px 16px 40px"}}>

      {/* CUSTOMERS TAB */}
      {tab==="cust" && <div>
        {d.loading && <div style={{textAlign:"center",padding:30,color:T3}}>Loading...</div>}

        {/* ACTION REQUIRED SECTION */}
        {!d.loading && (d.cust&&d.cust.action_required||[]).length>0 && <div style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:"#ff6b6b",marginBottom:8}}>🔴 Action Required — {(d.cust.action_required||[]).length} students waiting</div>
          <div style={{background:S1,border:"1px solid "+B1,borderRadius:10,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1fr 2fr",padding:"8px 12px",borderBottom:"1px solid "+B1,fontSize:9,fontWeight:700,color:T3}}>
              <span>Student</span><span>Stage</span><span>Waiting</span><span>Status</span><span>Action Needed</span>
            </div>
            {(d.cust.action_required||[]).map(function(ar,i){
              var h=ar.waiting_hours||0;
              var sc_=h>=4?"#ef4444":h>=1?"#f59e0b":"#10b981";
              var badge_=h>=4?"\uD83D\uDD34 Urgent":h>=1?"\uD83D\uDFE1 Attention":"\uD83D\uDFE2 OK";
              return <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1fr 2fr",padding:"10px 12px",borderBottom:"1px solid "+B1+"60",alignItems:"center",fontSize:11}}>
                <span>{ar.zoho_link?<a href={ar.zoho_link} target="_blank" style={{color:PK,fontWeight:600,textDecoration:"none"}}>{ar.name}</a>:<span style={{color:PK,fontWeight:600}}>{ar.name}</span>}</span>
                <span style={{color:CY,fontSize:9}}>{ar.agent||ar.state}</span>
                <span style={{fontFamily:"monospace",color:sc_,fontWeight:700}}>{h>=1?h.toFixed(1)+"h":Math.round(h*60)+"m"}</span>
                <span style={{fontSize:8,fontWeight:700,padding:"2px 6px",borderRadius:6,color:sc_,background:sc_+"20"}}>{badge_}</span>
                <span style={{fontSize:10,color:T2}}>{ar.action_needed}</span>
              </div>
            })}
          </div>
        </div>}

        {/* ALL CUSTOMERS LIST */}
        {!d.loading && customers.length===0 && (d.cust&&d.cust.action_required||[]).length===0 && <div style={{textAlign:"center",padding:30,color:T3}}>No customers yet — will show when customers message via LINE</div>}
        {customers.length>0 && <div>
          <div style={{fontSize:11,fontWeight:600,color:CY,marginBottom:6}}>📡 All Customers — {customers.length} <span style={{fontSize:8,color:G}}>auto-refresh 30s</span></div>
          {customers.map(function(c,i){
            return <div key={i} onClick={function(){setSelC(c)}} style={{background:S1,border:"1px solid "+B1,borderRadius:10,padding:12,marginBottom:6,cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,flexWrap:"wrap",gap:4}}>
                <span style={{color:PK,fontWeight:600}}>{c.name||c.user_id}</span>
                <span style={{fontSize:8,fontWeight:700,padding:"2px 7px",borderRadius:6,color:CY,background:CY+"15"}}>{c.state}</span>
              </div>
              <div style={{fontSize:9,color:T3}}>Agent: <span onClick={function(e){e.stopPropagation();var ag=agents.find(function(a){return a.name===c.agent});if(ag)setSelA(ag)}} style={{color:CY,fontWeight:600,cursor:"pointer"}}>{c.agent||"\u2014"}</span></div>
            </div>
          })}
        </div>}
      </div>}

      {/* AGENTS TAB */}
      {tab==="agents" && <div>
        {d.loading && <div style={{textAlign:"center",padding:30,color:T3}}>Loading...</div>}
        {agents.length>0 && <div>
          <div style={{fontSize:11,fontWeight:600,color:CY,marginBottom:6}}>📡 {summary.total||agents.length} agents ({summary.live||0} live, {summary.wip||0} wip, {summary.plan||0} plan)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:5}}>
            {agents.map(function(a){
              var m=a.metrics||{};
              return <div key={a.id} onClick={function(){setSelA(a)}} style={{background:S1,border:"1px solid "+(a.error_count_24h>0?R+"40":B1),borderRadius:8,padding:10,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                  <span style={{fontSize:14}}>{a.icon}</span>
                  <span style={{color:CY,fontWeight:600,fontSize:11}}>{a.name}</span>
                  <span style={{fontSize:7,fontWeight:700,padding:"1px 5px",borderRadius:5,color:sc(a.status),background:sc(a.status)+"15"}}>{(a.status||"").toUpperCase()}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3,marginBottom:4}}>
                  {[[m.total_calls||0,"CALLS",B],[m.success_rate>0?m.success_rate+"%":"\u2014","RATE",G],[m.avg_ms>1000?(m.avg_ms/1000).toFixed(1)+"s":m.avg_ms>0?m.avg_ms+"ms":"\u2014","TIME",B]].map(function(x,i){
                    return <div key={i} style={{background:S2,borderRadius:4,padding:"3px 4px",textAlign:"center"}}>
                      <div style={{fontSize:11,fontWeight:700,fontFamily:"monospace",color:x[2]}}>{x[0]}</div>
                      <div style={{fontSize:6,color:T3}}>{x[1]}</div>
                    </div>
                  })}
                </div>
                <div style={{fontSize:7,color:T3,display:"flex",justifyContent:"space-between"}}><span>Auto%</span><span style={{fontFamily:"monospace",color:a.auto>=80?G:a.auto>0?A:T3}}>{a.auto}%</span></div>
                <Bar v={a.auto} c={a.auto>=80?G:A}/>
                {a.error_count_24h>0&&<div style={{fontSize:8,color:R,marginTop:3}}>⚠️ {a.error_count_24h} errors 24h</div>}
              </div>
            })}
          </div>
        </div>}
      </div>}

      {/* TASKS TAB */}
      {tab==="tasks" && <div>
        {d.loading && <div style={{textAlign:"center",padding:30,color:T3}}>Loading...</div>}
        {!d.loading && errors.length===0 && tasks.length===0 && <div style={{textAlign:"center",padding:30,color:T3}}>No tasks/errors today — will show when agents process messages</div>}
        {errors.length>0 && <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:R,marginBottom:4}}>🔴 Errors ({errors.length})</div>
          {errors.slice(0,15).map(function(e,i){
            return <div key={i} style={{background:S1,border:"1px solid "+R+"30",borderRadius:6,padding:"6px 10px",marginBottom:3,fontSize:10}}>
              <b style={{color:R}}>{e.agent||"?"}</b> <span style={{color:T2}}>{e.message||e.error||""}</span>
            </div>
          })}
        </div>}
        {tasks.length>0 && <div>
          <div style={{fontSize:11,fontWeight:600,color:G,marginBottom:4}}>📋 Tasks ({tasks.length})</div>
          {tasks.slice(0,20).map(function(t,i){
            return <div key={i} style={{background:S1,border:"1px solid "+B1,borderRadius:6,padding:"6px 10px",marginBottom:3,display:"flex",alignItems:"center",gap:7,fontSize:10}}>
              <span style={{fontFamily:"monospace",color:T3,minWidth:45}}>{t.time_str||"\u2014"}</span>
              <span style={{fontWeight:600,color:CY}}>{t.agent||"?"}</span>
              <span style={{color:T2,flex:1}}>{t.action||""}</span>
              <span style={{fontSize:7,fontWeight:700,padding:"1px 5px",borderRadius:5,color:sc(t.status),background:sc(t.status)+"12"}}>{t.status||"?"}</span>
            </div>
          })}
        </div>}
      </div>}

      {/* PERFORMANCE TAB */}
      {tab==="perf" && <div>
        {d.loading && <div style={{textAlign:"center",padding:30,color:T3}}>Loading...</div>}
        {perfAgents.length>0 && <div>
          <div style={{fontSize:11,fontWeight:600,color:CY,marginBottom:8}}>📡 Performance from Redis</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:5,marginBottom:14}}>
            {[[perfAgents.reduce(function(s,a){return s+(a.total_calls||0)},0),"Total Calls",B],[perfAgents.filter(function(a){return a.total_calls>0}).length+"/"+perfAgents.length,"Active",G],[perfAgents.reduce(function(s,a){return s+(a.fail||0)},0),"Fails",R]].map(function(x,i){
              return <div key={i} style={{background:S1,border:"1px solid "+B1,borderRadius:8,padding:"8px 10px"}}>
                <div style={{fontSize:16,fontWeight:700,fontFamily:"monospace",color:x[2]}}>{x[0]}</div>
                <div style={{fontSize:7,color:T3,textTransform:"uppercase"}}>{x[1]}</div>
              </div>
            })}
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
              <thead><tr>{["Agent","Status","Calls","Success","Fail","Rate","Time"].map(function(h){
                return <th key={h} style={{textAlign:"left",fontSize:7,fontWeight:600,color:T3,padding:"5px 6px",borderBottom:"1px solid "+B1}}>{h}</th>
              })}</tr></thead>
              <tbody>{perfAgents.sort(function(a,b){return(b.total_calls||0)-(a.total_calls||0)}).map(function(a){
                return <tr key={a.id} style={{borderBottom:"1px solid "+B1}}>
                  <td style={{padding:"5px 6px",fontWeight:600}}>{a.icon} {a.name}</td>
                  <td><span style={{fontSize:7,fontWeight:700,color:sc(a.status)}}>{(a.status||"").toUpperCase()}</span></td>
                  <td style={{fontFamily:"monospace"}}>{a.total_calls||0}</td>
                  <td style={{fontFamily:"monospace",color:G}}>{a.success||0}</td>
                  <td style={{fontFamily:"monospace",color:(a.fail||0)>0?R:T3}}>{a.fail||0}</td>
                  <td style={{fontFamily:"monospace",color:(a.success_rate||0)>=90?G:(a.success_rate||0)>0?A:T3}}>{a.success_rate>0?a.success_rate+"%":"\u2014"}</td>
                  <td style={{fontFamily:"monospace",fontSize:9}}>{(a.avg_ms||0)>1000?((a.avg_ms)/1000).toFixed(1)+"s":(a.avg_ms||0)>0?a.avg_ms+"ms":"\u2014"}</td>
                </tr>
              })}</tbody>
            </table>
          </div>
        </div>}
      </div>}

      {/* COMM MAP TAB */}
      {tab==="map" && <div>
        {d.loading && <div style={{textAlign:"center",padding:30,color:T3}}>Loading...</div>}
        {!d.loading && <div>
          <div style={{fontSize:11,fontWeight:600,color:CY,marginBottom:8}}>📡 Agent Communication Map — Live Flow</div>
          <div style={{background:S1,border:"1px solid "+B1,borderRadius:12,padding:16,overflowX:"auto"}}>
            <svg viewBox="0 0 960 820" style={{width:"100%",minWidth:700,height:"auto"}}>
              <defs>
                <marker id="ah" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#2dd4a0" opacity="0.6"/></marker>
              </defs>
              <style>{`
                @keyframes flowR{0%{stroke-dashoffset:40}100%{stroke-dashoffset:0}}
                @keyframes pulse2{0%,100%{opacity:0.3}50%{opacity:1}}
                .fl{stroke:#2dd4a040;stroke-width:2;fill:none;marker-end:url(#ah)}
                .fa{stroke:#2dd4a0;stroke-width:2.5;fill:none;stroke-dasharray:8 32;animation:flowR 2s linear infinite;opacity:0.7}
                .nb{rx:8;ry:8;stroke-width:1.5}
                .nl{fill:#13161f;stroke:#2dd4a060}
                .ne{fill:#13161f;stroke:#30d5e860}
                .lt{fill:#e6e8ef;font-size:8.5px;font-weight:600;font-family:system-ui,sans-serif}
