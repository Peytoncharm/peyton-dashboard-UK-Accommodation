// ═══ COMPONENTS ═══
const Link = ({children,color=CY,onClick}) => (
  <span onClick={onClick} style={{color,cursor:"pointer",fontWeight:600,borderBottom:`1px dashed ${color}40`}}>{children}</span>
);

const Bar = ({v,c=G}) => (
  <div style={{width:"100%",height:4,background:S3,borderRadius:2,overflow:"hidden"}}>
    <div style={{width:`${Math.min(v,100)}%`,height:"100%",borderRadius:2,background:c}}/>
  </div>
);

function Modal({children,onClose}) {
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:100,display:"flex",justifyContent:"center",alignItems:"flex-start",paddingTop:32,overflowY:"auto"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0d0f16",border:`1px solid ${B1}`,borderRadius:12,width:"92%",maxWidth:660,maxHeight:"85vh",overflowY:"auto",padding:18}}>
        <div style={{textAlign:"right"}}><button onClick={onClose} style={{background:"none",border:"none",color:T3,fontSize:18,cursor:"pointer"}}>✕</button></div>
        {children}
      </div>
    </div>
  );
}

// ═══ JOURNEY TIMELINE ═══
function Journey({journey, onClickAgent}) {
  return journey.map((step,i) => {
    const ag = AG(step.agent);
    const cfg = STEP_CFG[step.st] || STEP_CFG.pending;
    const ef = ag ? ag.errFreq : 0;
    const isLast = i === journey.length - 1;

    return (
      <div key={i} style={{display:"flex",gap:10,marginBottom:isLast?0:2}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:18}}>
          <div style={{width:18,height:18,borderRadius:9,background:cfg.color+"18",border:`2px solid ${cfg.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,flexShrink:0}}>{cfg.icon}</div>
          {!isLast && <div style={{width:2,flex:1,background:step.st==="success"?G+"30":B1,minHeight:16}}/>}
        </div>
        <div style={{flex:1,background:S1,border:`1px solid ${step.st==="waiting_approval"?OR+"50":step.st==="in_progress"?B+"50":step.st==="fail"?R+"40":B1}`,borderRadius:8,padding:10,marginBottom:4}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontSize:13}}>{ag?.icon||"?"}</span>
              <Link color={CY} onClick={()=>ag && onClickAgent(ag)}>{step.agent}</Link>
              <span style={{fontSize:7,fontWeight:700,padding:"1px 5px",borderRadius:5,color:cfg.color,background:cfg.color+"15"}}>{cfg.label}</span>
            </div>
            <span style={{fontSize:8,fontFamily:"monospace",color:T3}}>{step.time}</span>
          </div>
          <div style={{fontSize:10,color:step.st==="fail"?R:step.st==="in_progress"?B:T2,marginTop:3}}>{step.act}</div>
          {ag && (
            <div style={{display:"flex",gap:8,marginTop:5,fontSize:8,color:T3}}>
              <span>Error Rate: <b style={{fontFamily:"monospace",color:ef>15?R:ef>5?A:G}}>{ef}%</b></span>
              <span>Success: <b style={{fontFamily:"monospace",color:rc(ag.rate)}}>{ag.rate}%</b></span>
              <span>Avg: <b style={{fontFamily:"monospace"}}>{ag.avgMs>1000?`${(ag.avgMs/1000).toFixed(1)}s`:`${ag.avgMs}ms`}</b></span>
            </div>
          )}
          {step.st==="waiting_approval" && step.note && (
            <div style={{marginTop:5,background:OR+"10",border:`1px solid ${OR}25`,borderRadius:6,padding:"5px 8px",fontSize:9,color:OR}}>
              🔔 <b>รอ Approve จากทีม:</b> {step.note}
            </div>
          )}
          {step.st==="fail" && step.note && (
            <div style={{marginTop:5,background:R+"10",border:`1px solid ${R}25`,borderRadius:6,padding:"5px 8px",fontSize:9,color:R}}>
              🚨 <b>ต้องแก้ไข:</b> {step.note}
            </div>
          )}
          {step.st==="in_progress" && step.note && (
            <div style={{marginTop:5,background:B+"10",border:`1px solid ${B}25`,borderRadius:6,padding:"5px 8px",fontSize:9,color:B}}>
              ⚙️ <b>AI Agent กำลังทำงาน:</b> {step.note}
            </div>
          )}
          {step.st==="pending" && step.note && (
            <div style={{marginTop:5,background:A+"10",border:`1px solid ${A}25`,borderRadius:6,padding:"5px 8px",fontSize:9,color:A}}>
              ⏸️ <b>รอลูกค้า:</b> {step.note}
            </div>
          )}
        </div>
      </div>
    );
  });
}

                <span style={{fontSize:13,minWidth:20}}>{a.icon}</span>
                <span style={{fontSize:10,fontWeight:600,minWidth:110,color:CY}}>{a.name}</span>
                <div style={{flex:1,height:14,background:S3,borderRadius:3,overflow:"hidden",position:"relative"}}>
                  <div style={{height:"100%",width:barW+"%",borderRadius:3,background:isLong?OR:a.avgMs>3000?A:G}}/>
                  <span style={{position:"absolute",right:4,top:0,fontSize:8,fontWeight:700,color:T1,lineHeight:"14px"}}>{timeStr}</span>
                </div>
              </div>;
            })}
          </div>
        </>}

        {/* ═══ AGENTS ═══ */}
        {tab==="agents" && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:5}}>
            {AGENTS.filter(a=>a.calls>0).sort((a,b)=>b.rate-a.rate).map(a => (
              <div key={a.id} onClick={()=>setSelA(a)} style={{background:S1,border:`1px solid ${B1}`,borderRadius:8,padding:10,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                  <span style={{fontSize:15}}>{a.icon}</span>
                  <Link color={CY} onClick={()=>setSelA(a)}>{a.name}</Link>
                  <span style={{fontSize:7,fontWeight:700,padding:"1px 5px",borderRadius:6,color:a.status==="live"?G:A,background:(a.status==="live"?G:A)+"15"}}>{a.status.toUpperCase()}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3,marginBottom:5}}>
                  {[[`${a.rate}%`,"RATE",rc(a.rate)],[`${a.errFreq}%`,"ERR",a.errFreq>15?R:G],[a.avgMs>1000?`${(a.avgMs/1000).toFixed(1)}s`:`${a.avgMs}ms`,"TIME",B]].map(([v,l,c],i) => (
                    <div key={i} style={{background:S2,borderRadius:4,padding:"3px 4px",textAlign:"center"}}>
                      <div style={{fontSize:11,fontWeight:700,fontFamily:"monospace",color:c}}>{v}</div>
                      <div style={{fontSize:6,color:T3}}>{l}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:7,color:T3,display:"flex",justifyContent:"space-between"}}><span>Auto%</span><span style={{fontFamily:"monospace",color:a.auto>=80?G:A}}>{a.auto}%</span></div>
                <Bar v={a.auto} c={a.auto>=80?G:A}/>
              </div>
            ))}
          </div>
        )}

        {/* ═══ TASKS ═══ */}
        {tab==="tasks" && TASKS.map((t,i) => (
          <div key={i} style={{background:S1,border:`1px solid ${B1}`,borderRadius:6,padding:"6px 10px",marginBottom:3,display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",fontSize:10}}>
            <span style={{fontFamily:"monospace",color:T3,minWidth:34}}>{t.time}</span>
            <Link color={CY} onClick={()=>setSelA(AG(t.agent))}>{t.agent}</Link>
            <span style={{color:T2,flex:1}}>{t.action}</span>
            {t.user!=="system" && <Link color={PK} onClick={()=>{const cu=CUSTOMERS.find(c=>c.id===t.user);if(cu)setSelC(cu)}}>{CUSTOMERS.find(c=>c.id===t.user)?.name||t.user.slice(0,8)}</Link>}
            <span style={{fontSize:7,fontWeight:700,padding:"1px 5px",borderRadius:5,color:tc(t.status),background:tc(t.status)+"12"}}>{t.status}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

document.getElementById("loading").style.display="none";
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
